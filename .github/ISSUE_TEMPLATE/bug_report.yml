name: Bug report
description: Something is broken
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      description: Minimal commands to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit / version
      description: "Output of: git -C ~/dev/agent-message rev-parse --short HEAD"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux (Debian/Ubuntu)
        - Linux (other)
        - WSL
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: python3 --version
    validations:
      required: true
  - type: dropdown
    id: path
    attributes:
      label: Which path is affected?
      multiple: true
      options:
        - Claude Code slash commands
        - msg shell function
        - ~/.agent-message-cmd wrapper (other agent / script)
        - install.sh
    validations:
      required: true
